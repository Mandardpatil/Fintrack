{% extends 'base.html' %}
{% block title %}Add Saving{% endblock %}
{% block page_title %}Add Saving{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <div class="card">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:24px;">🏦 Record a Saving</h2>
    <form method="POST" action="{{ url_for('add_saving') }}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Amount (₹) *</label>
          <input class="form-control" type="number" name="amount" step="0.01" min="0.01" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label class="form-label">Goal</label>
          <select class="form-control" name="goal">
            {% for g in saving_goals %}<option value="{{ g }}">{{ g }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-control" type="text" name="description" placeholder="What are you saving for?">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Target Amount (₹) <span style="color:var(--text-dim);font-weight:400;">(optional)</span></label>
          <input class="form-control" type="number" name="target_amount" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input class="form-control" type="date" name="date" value="{{ today }}" required>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-success" type="submit">💾 Save</button>
        <a href="{{ url_for('savings') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
