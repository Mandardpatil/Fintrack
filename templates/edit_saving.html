{% extends 'base.html' %}
{% block title %}Edit Saving{% endblock %}
{% block page_title %}Edit Saving{% endblock %}
{% block content %}
<div style="max-width:560px;">
  <div class="card">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:24px;">✏️ Edit Saving</h2>
    <form method="POST" action="{{ url_for('edit_saving', sid=saving.id) }}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Amount (₹) *</label>
          <input class="form-control" type="number" name="amount" step="0.01" value="{{ saving.amount }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Goal</label>
          <select class="form-control" name="goal">
            {% for g in saving_goals %}<option value="{{ g }}" {% if g == saving.goal %}selected{% endif %}>{{ g }}</option>{% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-control" type="text" name="description" value="{{ saving.description or '' }}">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Target Amount (₹)</label>
          <input class="form-control" type="number" name="target_amount" step="0.01" value="{{ saving.target_amount }}">
        </div>
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input class="form-control" type="date" name="date" value="{{ saving.date.strftime('%Y-%m-%d') }}" required>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary" type="submit">✅ Update</button>
        <a href="{{ url_for('savings') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
