{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">💰</div>
      <h2 class="auth-title">Welcome Back</h2>
      <p class="auth-sub">Sign in to your FinTrack account</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input id="login-email" class="form-control" type="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input id="login-password" class="form-control" type="password" name="password"
               placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn-auth" type="submit" id="btn-login">Sign In →</button>
    </form>

    <div class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('register') }}" style="color:var(--primary-light);font-weight:600;">Create one</a>
    </div>
  </div>
</div>
{% endblock %}
