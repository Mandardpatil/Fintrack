{% extends 'base.html' %}
{% block title %}Edit Expense{% endblock %}
{% block page_title %}Edit Expense{% endblock %}

{% block content %}
<div style="max-width:620px;">
  <div class="card">
    <h2 style="font-size:18px;font-weight:700;margin-bottom:24px;">✏️ Edit Expense</h2>

    <form method="POST" action="{{ url_for('edit_expense', exp_id=expense.id) }}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="edit-amount">Amount (₹) *</label>
          <input id="edit-amount" class="form-control" type="number" name="amount"
                 step="0.01" min="0.01" value="{{ expense.amount }}" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-category">Category *</label>
          <select id="edit-category" class="form-control" name="category" required>
            {% for c in categories %}
            <option value="{{ c }}" {% if c == expense.category %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="edit-desc">Description</label>
        <input id="edit-desc" class="form-control" type="text" name="description"
               value="{{ expense.description or '' }}">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="edit-date">Date *</label>
          <input id="edit-date" class="form-control" type="date" name="date"
                 value="{{ expense.date.strftime('%Y-%m-%d') }}" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="edit-saved">Money Saved (₹)</label>
          <input id="edit-saved" class="form-control" type="number" name="saved_amount"
                 step="0.01" min="0" value="{{ expense.saved_amount }}">
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-primary" type="submit" id="btn-update-exp">✅ Update Expense</button>
        <a href="{{ url_for('expenses') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
